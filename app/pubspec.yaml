name: petlove
description: "A Warm Healing Pet Shared App for Couples."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  
  # Rust Bridge (v2 syntax conceptually)
  flutter_rust_bridge: ^2.0.0
  rust_lib_petlove:
    path: ../rust_builder
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  path: ^1.9.0
  image_picker: ^1.2.2
  fl_chart: ^0.71.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/categories.json
