name: petlove
description: "A Warm Healing Pet Shared App for Couples."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & Routing
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  
  # Rust Bridge (v2 syntax conceptually)
  flutter_rust_bridge: ^2.0.0
  rust_lib_petlove:
    path: ../rust_builder
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  path: ^1.9.0
  image_picker: ^1.2.2
  fl_chart: ^1.2.0
  package_info_plus: ^10.1.0
  http: ^1.6.0
  ota_update: ^7.1.0
  flutter_svg: ^2.0.10

dependency_overrides: 
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  macos:
    generate: true
    image_path: "assets/icons/app/appicon.png"
  image_path: "assets/icons/app/appicon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app/appicon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/categories.json
    - assets/icons/categories/
    - assets/icons/app/
